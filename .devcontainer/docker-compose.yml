version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    volumes:
      - ..:/workspace:cached

    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/insiao_dev"
      NEXT_PUBLIC_APP_NAME: "In Sião"

    command: sleep infinity

    depends_on:
      - db

  db:
    image: postgres:16

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insiao_dev

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: